name: deploy

# Story 5.2 — main 머지 시 GHCR push → SSH 직결 배포 + healthcheck + 자동 롤백.
# OIDC / IAM Role / CodeDeploy 모두 봉인된 학생 계정 제약 하에서의 PIVOT 사양.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      rollback_to:
        description: "롤백 대상 git SHA (비우면 최신 main 배포)"
        required: false
        default: ""

# 배포 워크플로는 직렬 처리 — state 일관성 보호. CI(`ci.yml`)와 의도적으로 다름.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # 1) lint-test gate — branch protection 우회(workflow_dispatch 등) 시에도 안전.
  # ---------------------------------------------------------------------------
  lint-test-crawler:
    uses: ./.github/workflows/crawler.yml

  lint-test-detection:
    uses: ./.github/workflows/detection.yml

  lint-test-api:
    uses: ./.github/workflows/api.yml

  lint-test-dashboard:
    uses: ./.github/workflows/dashboard.yml

  # ---------------------------------------------------------------------------
  # 2) BuildKit multi-stage + GHCR registry cache mode=max.
  # ---------------------------------------------------------------------------
  build-push:
    name: build-push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs:
      - lint-test-crawler
      - lint-test-detection
      - lint-test-api
      - lint-test-dashboard
    strategy:
      fail-fast: true
      matrix:
        service: [crawler, detection, api, dashboard]
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      registry_path: ${{ steps.meta.outputs.registry_path }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute image metadata
        id: meta
        run: |
          set -euo pipefail
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          REPO="$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"
          REG_PATH="ghcr.io/${OWNER}/${REPO}"
          TAG="${{ github.sha }}"
          echo "registry_path=${REG_PATH}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.service }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          # main push 시 :sha + :latest 동시 태깅. workflow_dispatch도 동일.
          tags: |
            ${{ steps.meta.outputs.registry_path }}/${{ matrix.service }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.registry_path }}/${{ matrix.service }}:latest
          # mode=max — 멀티스테이지 모든 레이어 캐싱 (inline cache는 min만 가능 → 미사용).
          cache-from: type=registry,ref=${{ steps.meta.outputs.registry_path }}/${{ matrix.service }}:cache
          cache-to: type=registry,ref=${{ steps.meta.outputs.registry_path }}/${{ matrix.service }}:cache,mode=max
          provenance: false

  # ---------------------------------------------------------------------------
  # 3) SSH .pem GH Secret 직결 배포 + healthcheck + 자동 롤백 (단일 호스트).
  #
  # 2026-05-07 3차 PIVOT: 학생 IAM SCP가 cross-SG ingress(redis 6379 source =
  # crawler-sg)를 차단해 2대 분리 불가 → 단일 EC2 합반으로 회귀. redis 트래픽이
  # docker network 내부에 머물러 SG 룰 불필요. 메모리 OOM 위험은 compose 레벨
  # mem_limit + swap 4GB로 방어.
  # ---------------------------------------------------------------------------
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    # 학생 collaborator 권한이 GH Environment 만들기 차단 → Repository secrets로 우회.
    # environment 보호 게이트(required reviewers 등) 잃지만 학생 프로젝트 규모에서 수용.
    needs: [build-push]
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Resolve target tag
        id: target
        run: |
          set -euo pipefail
          ROLLBACK="${{ inputs.rollback_to }}"
          if [ -n "${ROLLBACK}" ]; then
            echo "image_tag=${ROLLBACK}" >> "$GITHUB_OUTPUT"
            echo "::notice::Rollback mode — deploying tag ${ROLLBACK}"
          else
            echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          REPO="$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"
          echo "registry_path=ghcr.io/${OWNER}/${REPO}" >> "$GITHUB_OUTPUT"

      - name: Upload compose.prod.yml to EC2
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          fingerprint: ${{ secrets.EC2_HOST_FINGERPRINT }}
          source: "infra/compose.prod.yml"
          target: "/opt/app/"
          strip_components: 1
          overwrite: true

      - name: Deploy + healthcheck + auto-rollback
        uses: appleboy/ssh-action@v1.2.4
        env:
          IMAGE_TAG: ${{ steps.target.outputs.image_tag }}
          REGISTRY_PATH: ${{ steps.target.outputs.registry_path }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          fingerprint: ${{ secrets.EC2_HOST_FINGERPRINT }}
          script_stop: true
          envs: IMAGE_TAG,REGISTRY_PATH,GHCR_USER,GHCR_TOKEN
          script: |
            set -euo pipefail
            DOCKER=/usr/bin/docker
            DCOMPOSE="/usr/bin/docker compose"
            DATE=/usr/bin/date
            SLEEP=/usr/bin/sleep
            CAT=/usr/bin/cat
            ECHO=/usr/bin/echo

            cd /opt/app

            $ECHO "$GHCR_TOKEN" | $DOCKER login ghcr.io -u "$GHCR_USER" --password-stdin

            PREV_TAG="$($CAT /opt/app/IMAGE_TAG 2>/dev/null || $ECHO latest)"
            $ECHO "previous_tag=${PREV_TAG}"
            $ECHO "new_tag=${IMAGE_TAG}"

            export IMAGE_TAG REGISTRY_PATH

            $DCOMPOSE -f /opt/app/compose.prod.yml pull
            $DCOMPOSE -f /opt/app/compose.prod.yml up -d --remove-orphans

            DEADLINE=$(( $($DATE +%s) + 60 ))
            ALL_OK=0
            while [ $($DATE +%s) -lt $DEADLINE ]; do
              $SLEEP 3
              ALL_OK=1
              for SVC in redis crawler detection api dashboard; do
                CID=$($DCOMPOSE -f /opt/app/compose.prod.yml ps -q "$SVC" || true)
                if [ -z "$CID" ]; then ALL_OK=0; break; fi
                STATUS=$($DOCKER inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$CID" 2>/dev/null || $ECHO unknown)
                $ECHO "  ${SVC}: ${STATUS}"
                if [ "$STATUS" != "healthy" ]; then ALL_OK=0; fi
              done
              if [ "$ALL_OK" = "1" ]; then break; fi
            done

            if [ "$ALL_OK" = "1" ]; then
              $ECHO "$IMAGE_TAG" > /opt/app/IMAGE_TAG
              $ECHO "::notice::Deployed ${IMAGE_TAG} successfully."
              exit 0
            fi

            $ECHO "::error::Healthcheck failed within 60s — rolling back to ${PREV_TAG}"
            export IMAGE_TAG="$PREV_TAG"
            $DCOMPOSE -f /opt/app/compose.prod.yml pull || true
            $DCOMPOSE -f /opt/app/compose.prod.yml up -d --remove-orphans
            exit 1
